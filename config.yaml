# ADB Matrix Bot Configuration
# ================================

# Matrix bot settings
matrix:
  homeserver: "https://matrix.org"
  user_id: "@adb-bot:matrix.org"
  # Use access_token OR password (access_token takes precedence)
  access_token: ""
  password: ""
  # Room to send intercepts to (can be room ID !xxx:server or alias #xxx:server)
  room_id: ""
  # Device display name for Matrix sessions
  device_name: "adb-mitm-bot"
  # Path to store E2EE session (olm/megolm keys)
  store_path: "./e2ee_store"

# ADB proxy settings
adb:
  # Proxy listens on this port (ADB clients should connect here instead of 5037)
  listen_host: "127.0.0.1"
  listen_port: 5038
  # Real ADB server to forward to
  target_host: "127.0.0.1"
  target_port: 5037
  # Hold time after session ends before allowing a different session (seconds).
  # Commands arriving within this window are treated as the same session and
  # pass through without delay.  Set to e.g. 1.0 to give a bash script time
  # to finish before another terminal's adb commands are allowed through.
  session_hold_seconds: 0.0

# Interception rules
intercept:
  # Shell commands interception
  shell_commands: true

  # Capture and forward screenshots to Matrix
  screenshots: true

  # Forward command output (stdout/stderr) to Matrix  
  command_output: true

  # Intercept APK files pushed via adb install / adb push
  apk_files: true

  # Capture logcat output and forward to Matrix in batches
  # WARNING: produces a lot of messages if logcat runs continuously
  logcat_output: false

  # Max bytes of command output to forward (truncated if exceeded)
  max_output_bytes: 4096

  # Maximum screenshot file size to forward (bytes)
  max_screenshot_bytes: 4194304  # 4MB

  # Maximum APK file size to capture (bytes)
  max_apk_bytes: 104857600  # 100MB

  # Logcat batching: lines per Matrix message
  logcat_lines_per_message: 50

  # Logcat batching: stop capturing after this many total lines
  logcat_max_total_lines: 500

# Filter rules — which commands to intercept or ignore
filters:
  # Only intercept these commands (empty = intercept ALL)
  # Example: ["screencap", "input", "pm", "am"]
  include_commands: []

  # NEVER intercept these (always pass through silently)
  exclude_commands:
    - "logcat"
    - "dumpsys"
    - "bugreport"
    - "cmd stats"
    - "dumpsys meminfo"

# Notification formatting
formatting:
  # Prefix for command notifications in Matrix
  command_prefix: "📱 ADB"
  # Prefix for screenshot notifications
  screenshot_prefix: "📸 Screenshot"
  # Prefix for error notifications  
  error_prefix: "⚠️ ADB Error"
  # Show timestamps on Matrix messages
  show_timestamps: true
  # Include device serial in messages
  show_device: true
